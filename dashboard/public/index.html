<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Position Control</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Position Control</h1>
    <span id="status-badge" class="badge disconnected">Disconnected</span>
    <button id="btn-ports" class="btn-link">Change Port</button>
  </header>

  <main>
    <!-- Position Card -->
    <section class="card pos-card">
      <h2>Position</h2>
      <div class="pos-row">
        <div class="pos-display">
          <span class="pos-label">Target</span>
          <span id="pos-target" class="pos-value">0</span>
        </div>
        <div class="pos-display">
          <span class="pos-label">Actual</span>
          <span id="pos-actual" class="pos-value">0</span>
        </div>
      </div>
      <div class="pos-bar-track">
        <div id="pos-bar" class="pos-bar-fill" style="width: 50%"></div>
      </div>
      <div class="pos-row">
        <input type="number" id="target-input" value="0" class="target-input">
        <button id="btn-go" class="btn btn-primary">GO</button>
        <button id="btn-stop" class="btn btn-stop">STOP</button>
        <button id="btn-home" class="btn">HOME</button>
        <button id="btn-zero" class="btn">ZERO</button>
      </div>
    </section>

    <!-- Status Card -->
    <section class="card status-card">
      <h2>Status</h2>
      <table>
        <tr><td>Error</td><td id="status-error">0</td></tr>
        <tr><td>Velocity</td><td id="status-vel">0 steps/s</td></tr>
        <tr><td>Fault</td><td id="status-fault">No</td></tr>
        <tr><td>Moving</td><td id="status-moving">No</td></tr>
        <tr><td>At Target</td><td id="status-atarget">Yes</td></tr>
        <tr><td>Tune</td><td id="status-tune">Idle</td></tr>
      </table>
    </section>

    <!-- Queue Card -->
    <section class="card queue-card">
      <h2>Multi-Point Queue</h2>
      <div class="queue-row">
        <label>Dwell: <input type="number" id="dwell-input" value="500" min="0" max="30000" class="pid-num"> ms</label>
        <button id="btn-dwell" class="btn btn-small">Set</button>
      </div>
      <div class="queue-row">
        <textarea id="queue-input" rows="3" class="queue-textarea" placeholder="e.g. 10000, 20000, 30000, 40000"></textarea>
      </div>
      <div class="queue-row">
        <button id="btn-q-start" class="btn btn-primary">Start Queue</button>
        <button id="btn-q-stop" class="btn btn-stop">Stop Queue</button>
      </div>
      <div class="queue-row">
        <span id="queue-status" class="queue-status">Idle</span>
      </div>
    </section>

    <!-- Motor Test Card -->
    <section class="card motor-card">
      <h2>Motor Test</h2>
      <div class="motor-row">
        <button id="btn-on" class="btn btn-on">ON</button>
        <button id="btn-off" class="btn btn-off">OFF</button>
      </div>
      <div class="motor-row">
        <button id="btn-cw" class="btn">CW</button>
        <button id="btn-ccw" class="btn">CCW</button>
      </div>
      <div class="motor-row">
        <label>Speed: <span id="speed-label">100</span> steps/s</label>
        <input type="range" id="speed-slider" min="10" max="50000" value="100" class="speed-slider">
      </div>
    </section>

    <!-- PID Tuning Card -->
    <section class="card pid-card">
      <h2>PID Tuning</h2>
      <div class="pid-row">
        <label>Kp: <span id="kp-label">50</span></label>
        <input type="range" id="kp-slider" min="0" max="500" value="50" class="pid-slider">
      </div>
      <div class="pid-row">
        <label>Ki: <span id="ki-label">5</span></label>
        <input type="range" id="ki-slider" min="0" max="100" value="5" class="pid-slider">
      </div>
      <div class="pid-row">
        <label>Kd: <span id="kd-label">0</span></label>
        <input type="range" id="kd-slider" min="0" max="500" value="0" class="pid-slider">
      </div>
      <div class="pid-row">
        <label>MaxV: <input type="number" id="maxv-input" value="5000" min="10" max="50000" class="pid-num"></label>
        <button id="btn-maxv" class="btn btn-small">Set</button>
      </div>
      <div class="pid-row">
        <label>ACCEL: <input type="number" id="accel-input" value="50000" min="100" max="500000" class="pid-num"></label>
        <button id="btn-accel" class="btn btn-small">Set</button>
      </div>
      <div class="pid-row">
        <label>JERK: <input type="number" id="jerk-input" value="500000" min="1000" max="10000000" class="pid-num"></label>
        <button id="btn-jerk" class="btn btn-small">Set</button>
      </div>
      <div class="pid-row">
        <label>Profile:</label>
        <span id="profile-toggle" class="toggle-group">
          <button id="btn-profile-s" class="btn btn-small active">S-curve</button>
          <button id="btn-profile-t" class="btn btn-small">Trapezoidal</button>
        </span>
      </div>
      <div class="pid-row">
        <button id="btn-tune" class="btn btn-primary">Auto-Tune</button>
        <span id="tune-status" class="tune-status">Idle</span>
      </div>
      <div class="pid-row">
        <label>Tolerance: <input type="number" id="tol-input" value="5" min="0" max="1000" class="pid-num"></label>
        <button id="btn-tol" class="btn btn-small">Set</button>
      </div>
      <div class="pid-row">
        <label>Fault Threshold: <input type="number" id="ft-input" value="500" min="1" max="100000" class="pid-num"></label>
        <button id="btn-ft" class="btn btn-small">Set</button>
      </div>
      <div class="pid-row">
        <button id="btn-clear" class="btn">CLEAR FAULT</button>
      </div>
    </section>

    <!-- Connection Card -->
    <section class="card info-card">
      <h2>Connection</h2>
      <table>
        <tr><td>Port</td><td id="port-info">—</td></tr>
        <tr><td>Baud</td><td id="baud-info">—</td></tr>
        <tr><td>Status</td><td id="conn-status">Disconnected</td></tr>
      </table>
    </section>
  </main>

  <footer><span id="timestamp"></span></footer>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <h2>Select Serial Port</h2>
      <div id="port-list" class="port-list"><p class="muted">Scanning...</p></div>
      <div class="port-baud">
        <label for="baud-input">Baud:</label>
        <input type="number" id="baud-input" value="19200" min="9600" max="921600">
      </div>
      <div class="modal-actions">
        <button id="btn-refresh" class="btn">Refresh</button>
        <button id="btn-connect" class="btn btn-primary" disabled>Connect</button>
      </div>
      <p id="modal-error" class="modal-error"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
