<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor Speed Control</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Motor Speed Control</h1>
    <span id="status-badge" class="badge disconnected">Disconnected</span>
    <button id="btn-ports" class="btn-link">Change Port</button>
  </header>

  <main>
    <!-- RPM Card -->
    <section class="card rpm-card">
      <h2>Motor Speed</h2>
      <div class="rpm-display">
        <span id="rpm-value">0</span>
        <span class="rpm-unit">RPM</span>
      </div>
      <div class="rpm-bar-track">
        <div id="rpm-bar" class="rpm-bar-fill" style="width: 0%"></div>
      </div>
    </section>

    <!-- Direction Card -->
    <section class="card direction-card">
      <h2>Direction</h2>
      <div id="direction-indicator" class="direction-indicator stopped">
        <span id="direction-icon" class="direction-icon">&#9632;</span>
        <span id="direction-label">STOPPED</span>
      </div>
    </section>

    <!-- Control Card -->
    <section class="card control-card">
      <h2>Control</h2>
      <div class="control-row">
        <button id="btn-dir" class="btn btn-dir">CW</button>
        <button id="btn-motor" class="btn btn-motor-off">MOTOR OFF</button>
      </div>
      <div class="control-row">
        <label for="speed-slider">Speed</label>
        <input type="range" id="speed-slider" min="0" max="100" value="0" class="speed-slider">
        <span id="speed-label" class="speed-label">0%</span>
      </div>
      <div class="speed-hint">
        <span>0</span>
        <span id="speed-steps-label">0 steps/s</span>
        <span id="max-speed-label">10000</span>
      </div>
    </section>

    <!-- Encoder Card -->
    <section class="card enc-card">
      <h2>Encoder</h2>
      <div class="enc-display">
        <span class="pos-label">Position</span>
        <span id="enc-pos" class="enc-value">0</span>
        <span class="enc-unit">counts</span>
      </div>
      <table>
        <tr><td>PPR</td><td>4096</td></tr>
        <tr><td>Resolution</td><td>16384 counts/rev</td></tr>
      </table>
    </section>

    <!-- Connection Card -->
    <section class="card info-card">
      <h2>Connection</h2>
      <table>
        <tr><td>Port</td><td id="port-info">—</td></tr>
        <tr><td>Baud</td><td id="baud-info">—</td></tr>
        <tr><td>Status</td><td id="conn-status">Disconnected</td></tr>
      </table>
    </section>
  </main>

  <footer><span id="timestamp"></span></footer>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <h2>Select Serial Port</h2>
      <div id="port-list" class="port-list"><p class="muted">Scanning...</p></div>
      <div class="port-baud">
        <label for="baud-input">Baud:</label>
        <input type="number" id="baud-input" value="19200" min="9600" max="921600">
      </div>
      <div class="modal-actions">
        <button id="btn-refresh" class="btn">Refresh</button>
        <button id="btn-connect" class="btn btn-primary" disabled>Connect</button>
      </div>
      <p id="modal-error" class="modal-error"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
